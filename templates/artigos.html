{% extends "base.html" %}

{% block conteudo %}

<h1>Cadastro de Artigos</h1>

<form method="post" action="/artigos">

<label>Nome do Artigo:</label>
<input type="text" name="nome" required>

<br><br>

<label>Código:</label>
<input type="text" name="codigo" required>

<br><br>

<label>Valor por kg:</label>
<input type="number" step="0.01" name="valor_kg" required>

<br><br>

<label>Cliente:</label>
<select name="cliente_id" required>

{% for cliente in clientes %}
<option value="{{ cliente.id }}">{{ cliente.nome }}</option>
{% endfor %}

</select>

<br><br>

<button type="submit">Salvar</button>

</form>

<br>

<h2>Artigos cadastrados</h2>

<table>

<tr>
<th>ID</th>
<th>Nome</th>
<th>Código</th>
<th>Valor/kg</th>
<th>Cliente</th>
</tr>

{% for artigo in artigos %}
<tr>
<form method="post" action="/editar_artigo">

    <input type="hidden" name="artigo_id" value="{{ artigo.id }}">

    <td>
        <input type="text" name="nome" value="{{ artigo.nome }}" required>
    </td>

    <td>
        <input type="text" name="codigo" value="{{ artigo.codigo or '' }}">
    </td>

    <td>
        <input type="number" step="0.01" name="valor_kg"
               value="{{ artigo.valor_kg }}" required>
    </td>

    <td>
        <select name="cliente_id" required>
            {% for cliente in clientes %}
                <option value="{{ cliente.id }}"
                    {% if cliente.id == artigo.cliente_id %}selected{% endif %}>
                    {{ cliente.nome }}
                </option>
            {% endfor %}
        </select>
    </td>

    <td>
        <button type="submit">Salvar</button>
    </td>

</form>
</tr>
{% endfor %}
