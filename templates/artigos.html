{% extends "base.html" %}

{% block conteudo %}

<h1>Cadastro de Artigos</h1>

<h2>Novo Artigo</h2>

<form method="post" action="/artigos" style="margin-bottom:30px;">

    <div style="margin-bottom:10px;">
        <label>Nome:</label>
        <input type="text" name="nome" required>
    </div>

    <div style="margin-bottom:10px;">
        <label>Código:</label>
        <input type="text" name="codigo">
    </div>

    <div style="margin-bottom:10px;">
        <label>Valor/kg:</label>
        <input type="number" step="0.01" name="valor_kg" required>
    </div>

    <div style="margin-bottom:10px;">
        <label>Cliente:</label>
        <select name="cliente_id" required>
            {% for cliente in clientes %}
                <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
            {% endfor %}
        </select>
    </div>

    <button type="submit">Cadastrar Artigo</button>

</form>

<h2>Artigos Cadastrados</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Nome</th>
        <th>Código</th>
        <th>Valor/kg</th>
        <th>Cliente</th>
        <th>Ação</th>
    </tr>

    {% for artigo in artigos %}
    <tr>
        <form method="post" action="/editar_artigo">
            <input type="hidden" name="artigo_id" value="{{ artigo.id }}">

            <td>
                <input type="text" name="nome" value="{{ artigo.nome }}" required>
            </td>

            <td>
                <input type="text" name="codigo" value="{{ artigo.codigo or '' }}">
            </td>

            <td>
                <input type="number" step="0.01" name="valor_kg"
                       value="{{ artigo.valor_kg }}" required>
            </td>

            <td>
                <select name="cliente_id" required>
                    {% for cliente in clientes %}
                        <option value="{{ cliente.id }}"
                            {% if cliente.id == artigo.cliente_id %}selected{% endif %}>
                            {{ cliente.nome }}
                        </option>
                    {% endfor %}
                </select>
            </td>

            <td>
                <button type="submit">Salvar</button>
            </td>
        </form>
    </tr>
    {% endfor %}
</table>

{% endblock %}
