{% extends "base.html" %}

{% block conteudo %}

<div style="max-width:400px; margin:60px auto; background:white; padding:30px; border:1px solid #ddd; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">

    <h1 style="text-align:center; margin-top:0;">Login</h1>

    {% if erro %}
        <p style="color:red; text-align:center; font-weight:bold;">
            {{ erro }}
        </p>
    {% endif %}

    <form method="post" action="/login">

        <div style="margin-bottom:15px;">
            <label>Usuário:</label><br>
            <input type="text" name="username" required style="width:100%; min-width:unset;">
        </div>

        <div style="margin-bottom:20px;">
            <label>Senha:</label><br>
            <input type="password" name="senha" required style="width:100%; min-width:unset;">
        </div>

        <button type="submit" style="width:100%;">
            Entrar
        </button>

    </form>

</div>

{% endblock %}
