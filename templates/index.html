{% extends "base.html" %}

{% block conteudo %}

<div style="max-width:1100px; margin:0 auto;">

    <h1 style="text-align:center; margin-bottom:5px;">
        Painel da Produção
    </h1>

    <p style="text-align:center; color:#666; margin-top:0;">
        Data: <strong>{{ data_hoje }}</strong>
    </p>

    <div style="
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap:25px;
        margin-top:35px;
    ">

        <div style="
            background:white;
            border:1px solid #ddd;
            border-radius:10px;
            padding:22px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        ">
            <h3 style="margin-top:0; color:#555;">
                Produção do Dia
            </h3>

            <div style="
                font-size:36px;
                font-weight:bold;
                color:#2c3e50;
                margin-top:10px;
            ">
                {{ (total_dia or 0)|peso_br }}
            </div>

            <div style="color:#777;">kg</div>
        </div>

        <div style="
            background:white;
            border:1px solid #ddd;
            border-radius:10px;
            padding:22px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        ">
            <h3 style="margin-top:0; color:#555;">
                Valor do Dia
            </h3>

            <div style="
                font-size:36px;
                font-weight:bold;
                color:#27ae60;
                margin-top:10px;
            ">
                {{ (valor_total_dia or 0)|moeda_br }}
            </div>
        </div>

        <div style="
            background:white;
            border:1px solid #ddd;
            border-radius:10px;
            padding:22px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        ">
            <h3 style="margin-top:0; color:#555;">
                Peças em Estoque
            </h3>

            <div style="
                font-size:36px;
                font-weight:bold;
                color:#8e44ad;
                margin-top:10px;
            ">
                {{ total_pecas }}
            </div>
        </div>

        <div style="
            background:white;
            border:1px solid #ddd;
            border-radius:10px;
            padding:22px;
            text-align:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.05);
        ">
            <h3 style="margin-top:0; color:#555;">
                Peso em Estoque
            </h3>

            <div style="
                font-size:36px;
                font-weight:bold;
                color:#d35400;
                margin-top:10px;
            ">
                {{ (total_peso or 0)|peso_br }}
            </div>

            <div style="color:#777;">kg</div>
        </div>

    </div>

</div>

{% endblock %}
