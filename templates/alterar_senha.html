{% extends "base.html" %}

{% block conteudo %}

<div style="max-width:500px; margin:40px auto; background:white; padding:30px; border:1px solid #ddd; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">

    <h1 style="margin-top:0; text-align:center;">Alterar Senha</h1>

    {% if mensagem %}
        <p style="color:green; font-weight:bold; text-align:center;">
            {{ mensagem }}
        </p>
    {% endif %}

    {% if erro %}
        <p style="color:red; font-weight:bold; text-align:center;">
            {{ erro }}
        </p>
    {% endif %}

    <form method="post" action="/alterar-senha">

        <div style="margin-bottom:15px;">
            <label>Senha atual:</label><br>
            <input type="password" name="senha_atual" required style="width:100%; min-width:unset;">
        </div>

        <div style="margin-bottom:15px;">
            <label>Nova senha:</label><br>
            <input type="password" name="nova_senha" required style="width:100%; min-width:unset;">
        </div>

        <div style="margin-bottom:20px;">
            <label>Confirmar nova senha:</label><br>
            <input type="password" name="confirmar_senha" required style="width:100%; min-width:unset;">
        </div>

        <button type="submit" style="width:100%;">Salvar nova senha</button>

    </form>

</div>

{% endblock %}
